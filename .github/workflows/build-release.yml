name: Build and Release DMG

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 1.0.0)'
        required: true
        default: '1.0.0'

permissions:
  contents: write

jobs:
  build-macos:
    strategy:
      matrix:
        include:
          - arch: x64
            build_cmd: build:intel
            runner: macos-15-intel
          - arch: arm64
            build_cmd: build:arm64
            runner: macos-14
    runs-on: ${{ matrix.runner }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: app/package-lock.json

    - name: Get version from package.json
      id: package_version
      working-directory: app
      run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

    - name: Install Python dependencies
      env:
        # Honored by pip's build-isolation envs when building sdists from source
        # (e.g. pywhispercpp on the Intel runner). See build-constraints.txt.
        PIP_CONSTRAINT: ${{ github.workspace }}/build-constraints.txt
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Download bundled binaries (Ollama, ffmpeg)
      run: |
        chmod +x scripts/download-ollama.sh
        ./scripts/download-ollama.sh

    - name: Strip ad-hoc code signatures from dylibs (fixes install_name_tool on Intel)
      if: matrix.arch == 'x64'
      run: |
        # pywhispercpp ships pre-signed dylibs that install_name_tool can't modify
        # Strip signatures so PyInstaller can rewrite library paths
        find "$(python -c 'import site; print(site.getsitepackages()[0])')/pywhispercpp" \
          -name "*.dylib" -exec codesign --remove-signature {} \; 2>/dev/null || true
        echo "Stripped ad-hoc signatures from pywhispercpp dylibs"

    - name: Build mic-monitor helper (Swift)
      run: |
        chmod +x scripts/build-mic-monitor.sh
        # Matrix uses electron-builder's "x64"/"arm64" naming. swiftc wants
        # "x86_64"/"arm64", so translate when invoking the build script.
        if [ "${{ matrix.arch }}" = "x64" ]; then
          ./scripts/build-mic-monitor.sh x86_64
        else
          ./scripts/build-mic-monitor.sh arm64
        fi
        file bin/mic-monitor
        # Fail loudly if the binary doesn't match the matrix arch — silent
        # mismatches would ship users a Rosetta'd helper.
        case "${{ matrix.arch }}" in
          arm64)  file bin/mic-monitor | grep -q "arm64" ;;
          x64)    file bin/mic-monitor | grep -q "x86_64" ;;
        esac

    - name: Build Python backend with PyInstaller
      run: |
        pyinstaller stenoai.spec --noconfirm
        # Verify build and architecture
        ls -la dist/stenoai/
        file dist/stenoai/stenoai
        echo "Expected arch: ${{ matrix.arch }}"
        echo "Backend built successfully"

    - name: Install Electron dependencies
      working-directory: app
      run: npm ci

    - name: Import code signing certificate
      uses: apple-actions/import-codesign-certs@v2
      with:
        p12-file-base64: ${{ secrets.APPLE_CERTIFICATE }}
        p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

    - name: Build and notarize DMG for ${{ matrix.arch }}
      working-directory: app
      run: npm run ${{ matrix.build_cmd }}
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        APPLE_ID: ${{ secrets.APPLE_ID }}
        APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-${{ matrix.arch }}
        path: |
          app/dist/*.dmg
          app/dist/*.zip
          app/dist/*.yml
          app/dist/*.yaml
        retention-days: 1

  release:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: build-macos
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        fetch-tags: true

    - name: Get version from package.json
      id: package_version
      working-directory: app
      run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

    - name: Extract annotated tag message
      id: tag_body
      if: startsWith(github.ref, 'refs/tags/v')
      run: |
        # Pull the body of the annotated tag (strips the PGP signature if any).
        # Falls back to the commit subject if the tag is lightweight.
        MSG=$(git for-each-ref --format='%(contents:body)' "refs/tags/${{ github.ref_name }}")
        if [ -z "$MSG" ]; then
          MSG=$(git for-each-ref --format='%(contents:subject)' "refs/tags/${{ github.ref_name }}")
        fi
        {
          echo 'text<<STENO_RELEASE_EOF'
          echo "$MSG"
          echo 'STENO_RELEASE_EOF'
        } >> "$GITHUB_OUTPUT"

    - name: Download all build artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Prepare release files
      run: |
        mkdir -p release
        find artifacts -name "*.dmg" -exec cp {} release/ \;
        find artifacts -name "*.zip" -exec cp {} release/ \;
        # Merge per-arch latest-mac.yml files into a single yml whose `files:`
        # array lists both the x64 and arm64 zips. Without this, electron-updater
        # on Apple Silicon downloads the x64 zip and runs the whole app under
        # Rosetta — slow launch and slow runtime. The two build jobs run on
        # different runners (macos-15-intel + macos-14) and each writes its own
        # `latest-mac.yml`; a plain `cp` would let one overwrite the other.
        # x64 is kept as the base so top-level `path`/`sha512` stay unchanged.
        yq eval-all '
          (select(fileIndex == 0)) as $x64 |
          (select(fileIndex == 1)) as $arm64 |
          $x64
          | .files = ($x64.files + $arm64.files | unique_by(.url))
          | .releaseDate = ([$x64.releaseDate, $arm64.releaseDate] | sort | reverse | .[0])
        ' artifacts/build-x64/latest-mac.yml artifacts/build-arm64/latest-mac.yml \
          > release/latest-mac.yml
        echo "Merged latest-mac.yml:"
        cat release/latest-mac.yml
        ls -la release/
        # Create website-friendly aliases for DMGs
        version="${{ github.event.inputs.version || steps.package_version.outputs.version }}"
        cd release
        for dmg in *.dmg; do
          if [[ "$dmg" == *"-x64.dmg" ]]; then
            cp "$dmg" "stenoAI-macos-x64.dmg"
          elif [[ "$dmg" == *"-arm64.dmg" ]]; then
            cp "$dmg" "stenoAI-macos-arm64.dmg"
          fi
        done
        ls -la

    - name: Create Release with Assets
      uses: softprops/action-gh-release@v1
      with:
        name: StenoAI ${{ github.event.inputs.version || steps.package_version.outputs.version }}
        body: |
          ## StenoAI v${{ github.event.inputs.version || steps.package_version.outputs.version }}

          ${{ steps.tag_body.outputs.text }}

          ### Downloads

          - **Apple Silicon (M1-M5)**: `stenoAI-macos-arm64.dmg`
          - **Intel Macs**: `stenoAI-macos-x64.dmg`

          ### First Time Setup
          1. Download the appropriate DMG for your Mac
          2. Install by dragging StenoAI to Applications
          3. Launch app - setup wizard runs automatically
          4. Grant microphone permissions when prompted
          5. Start recording meetings!

          ### Requirements
          - macOS 10.14 or later
          - Internet connection for initial setup
          - Microphone access permissions
        files: |
          release/*.dmg
          release/*.zip
          release/*.yml
          release/*.yaml
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
